<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../Styles/subTabs.css">
    <title>Document</title>
    <script src="../JavaScript/achievement.js" defer></script>
</head>

<body>
    <section id="achievement-system">
        <header class="subTabTitle-header">
            <h2>Achievement System</h2>
        </header>

        <div class="navBar-Div">
            <nav class="nav-links">
                <a href="money-manager.html">Money Manager</a>
                <a href="healthy-habits.html">Healthy Habits Tracker</a>
                <a href="productivity-arena.html">Productivity Arena</a>
                <a href="../index.html">Login</a>
            </nav>
        </div>
        

        <section id="virtual-rewards" class="boxes">
            <div>
                <h3>
                    Unlock Virtual Rewards or Badges for consistent use
                </h3>
                <div class="badges-Div">
                    <div class="badge" id="badge-1"></div>
                    <div class="badge" id="badge-2"></div>
                    <div class="badge" id="badge-3"></div>
                </div>

                <p id="badge-status" style="font-weight: bold; color: #555;">
                    <span class="counter-Span">0</span> / 3 Badges Unlocked
                </p>
            </div>
        </section>

        <section id="feedback" class="boxes">
            <div>
                <p>Complete a challenge!</p>

                <button id="claim-Button">COMPLETE CHALLENGE</button>
            </div>
        </section>

    </section>

    <div id="popup-Div" class="hidden">
        <h2>SUCCESS!</h2>
        
        <div class="award-circle">
            AWARD
        </div>
        
        <p>You unlocked a new achievement badge.</p>
        <button id="closePopup-Button">AWESOME!</button>
    </div>

    <footer>
        <div class="footer-Div">
            <div class="footerAnchors-Div">
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </div>

        </div>

    </footer>
</body>

</html>
