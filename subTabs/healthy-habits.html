<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Healthy Habits</title>
    <link rel="stylesheet" href="../Styles/subTabs.css">
    <script src="../JavaScript/healthy_habits.js" defer></script>
</head>

<body>
    <section id="healthy-habits" class="main-content">
        <header class="subTabTitle-header">
            <h1>Healthy Habits</h1>
        </header>

        <div class="navBar-Div">
            <nav class="nav-links">
                <a href="money-manager.html">Money Manager</a>
                <a href="productivity-arena.html">Productivity Arena</a>
                <a href="achievement-system.html">Achievement System</a>
                <a href="../index.html">Login</a>
            </nav>
        </div>

        <div class="container">
            <form id="habits-form">
                <div class="boxes">
                    <h3>Nutrition</h3>
                    <div class="box-content">
                        <label for="calories">Enter your caloric intake:</label>
                        <input type="number" id="calories" name="calories" min="0">
                        <label for="meals">Log your meals:</label>
                        <textarea id="meals" name="meals" rows="5" cols="76"></textarea>
                        <label for="water">Enter your water intake in milliliters:</label>
                        <input type="number" id="water" name="water" min="0">
                    </div>
                </div>

                <br> <br>

                <div class="boxes">
                    <h3>Exercise</h3>
                    <div class="box-content">
                        <label for="sleep">Enter your hours of sleep last night:</label>
                        <input type="number" id="sleep" name="sleep" min="0">
                        <label for="exercise">Enter your hours of exercise today:</label>
                        <input type="number" id="exercise" name="exercise" min="0">
                    </div>
                </div>

                <br> <br>
                <div class="boxes">
                    <h3>Daily Entry</h3>
                    <div class="box-content">
                        <textarea id="dailyEntry" name="dailyEntry" rows="7" cols="76"></textarea>
                        <input type="submit" value="Submit">
                    </div>

                </div>
                <br> <br>
            </form>
        </div>


    </section>

    <footer>

        <div class="footer-Div">


            <div class="footerAnchors-Div">
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </div>

        </div>

    </footer>
</body>

</html>
