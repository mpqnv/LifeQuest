<body>
    <section id="productivity-arena">
        <header class="subTabTitle-header">
            <h1>Productivity Arena</h1>
        </header>

        <div class="navBar-Div">
            <nav class="nav-links">
                <a href="money-manager.html">Money Manager</a>

        <div class="tasks">
            <div class="boxes">
                <h3>Daily Goals</h3>
                <div class="box-content">
                    <label style="display: block; margin-bottom: 10px;">
                        <input type="checkbox" class="goal-check" value="10">
                        Generic Goal 1
                    </label>
                    <label style="display: block; margin-bottom: 10px;">
                        <input type="checkbox" class="goal-check" value="10">

            </div>
        </div>

        <div class="timer-section">
            <div class="boxes">
                <h3>Focus Timer</h3>

                <div class="box-contents">
                    <h4>Current Score: <span id="score">0</span> Pts</h4>
                    <h4>Streak Milestone: <span id="streak">0</span> Days</h4>
                    <h4>
                        Pomodoro Style Timer or session counter
                    </h4>

                    <h4>
                        Progress Points or Streak Milestones
                    </h4>
                </div>
            </div>

        </div>

        <style>

                margin: 25px 25px;
            }
